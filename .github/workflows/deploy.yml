name: Java CI con Maven y Despliegue

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Inyectamos los secretos como variables de entorno
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Grant execute permission for mvnw
      run: chmod +x api-inscripciones/mvnw

    # Al ejecutar con estas variables, Spring Boot podrá validar las credenciales 
    # de S3 durante la fase de testing o compilación si fuera necesario.
    - name: Build and Package with Maven
      run: ./api-inscripciones/mvnw -B package --file api-inscripciones/pom.xml -DskipTests