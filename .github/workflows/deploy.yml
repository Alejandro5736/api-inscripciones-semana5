name: Build and Push Docker Image

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Grant execute permission for mvnw
      run: chmod +x api-inscripciones/mvnw

    - name: Build and Package with Maven
      run: ./api-inscripciones/mvnw -B package --file api-inscripciones/pom.xml -DskipTests

    # Desinfectar el token de cualquier carácter invisible del navegador antes de enviarlo
    - name: Log in to Docker Hub
      run: |
        CLEAN_TOKEN=$(echo "${{ secrets.DOCKERHUB_TOKEN }}" | tr -dc 'a-zA-Z0-9_=-')
        echo "$CLEAN_TOKEN" | docker login -u "admin1009a" --password-stdin

    - name: Build and Push Docker image
      run: |
        docker build -t admin1009a/api-inscripciones:latest ./api-inscripciones
        docker push admin1009a/api-inscripciones:latest