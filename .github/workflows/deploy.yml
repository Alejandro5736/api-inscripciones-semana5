name: Build and Push Docker Image

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Descarga el código del repositorio
    - uses: actions/checkout@v4

    # 2. Configura JDK 21
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    # 3. Dar permisos de ejecución a mvnw
    - name: Grant execute permission for mvnw
      run: chmod +x api-inscripciones/mvnw

    # 4. Compilar y empaquetar
    - name: Build and Package with Maven
      run: ./api-inscripciones/mvnw -B package --file api-inscripciones/pom.xml -DskipTests

    # 5. Iniciar sesión en DockerHub
    - name: Log in to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 6. Construir y subir la imagen a DockerHub
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./api-inscripciones
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/api-inscripciones:latest