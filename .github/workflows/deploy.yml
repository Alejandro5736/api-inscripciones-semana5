name: Build and Push Docker Image

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Grant execute permission for mvnw
      run: chmod +x api-inscripciones/mvnw

    - name: Build and Package with Maven
      run: ./api-inscripciones/mvnw -B package --file api-inscripciones/pom.xml -DskipTests

    # Bloque nativo ultra-seguro: Desinfecta credenciales, inicia sesión, construye y sube
    - name: Docker Login, Build and Push
      run: |
        # 1. Limpiar a la fuerza cualquier espacio, tabulación o salto de línea invisible
        CLEAN_USER=$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr -d '[:space:]')
        CLEAN_TOKEN=$(echo "${{ secrets.DOCKERHUB_TOKEN }}" | tr -d '[:space:]')
        
        # 2. Autenticación directa
        echo "$CLEAN_TOKEN" | docker login -u "$CLEAN_USER" --password-stdin
        
        # 3. Construcción de la imagen usando el usuario limpio
        docker build -t "$CLEAN_USER/api-inscripciones:latest" ./api-inscripciones
        
        # 4. Subida de la imagen a Docker Hub
        docker push "$CLEAN_USER/api-inscripciones:latest"